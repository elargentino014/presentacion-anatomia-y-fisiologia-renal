        .bg-highlight { background-color: #2C6FCA; }

        /* Botón de fuente interactivo */
        .button_tag {
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
        }
        .clickable_source_tag {
            width: 1rem;
            height: 1rem;
        }

        /* Asegurar que no haya sombras ni degradados */
        * {
            box-shadow: none !important;
            background-image: none !important;
        }

    <div class="page_container">
        <!-- Diseño de cuadrícula principal -->
        <div class="grid grid-cols-12 h-full w-full" style="height: 720px;">
            
            <!-- Columna Izquierda: Contenido (7 columnas) -->
            <div class="col-span-7 flex flex-col justify-center pl-20 pr-10 z-20">
                
                <!-- Sección de Encabezado -->
                <div class="mb-12 relative">
                    <!-- Botón para el enlace de Cleveland Clinic -->
                    <div style="position: absolute; top: 0; right: 0;">
                        <button onclick="window.open(&#39;https://my.clevelandclinic.org/health/body/23127-renal-cortex&#39;, &#39;_blank&#39;)" class="button_tag">
                            <div class="clickable_source_tag"></div> 
                        </button>
                    </div>

                    <h1 class="text-white text-5xl font-bold tracking-tight mb-2">
                        ANATOMÍA
                    </h1>
                    <h1 class="text-brand text-5xl font-extrabold tracking-tight mb-8">
                        EXTERNA DEL RIÑÓN
                    </h1>
                    
                    <div class="w-full">
                        <p class="text-white text-lg leading-relaxed">
                            Los riñones presentan una forma de frijol y coloración rojiza característica. Se ubican en posición retroperitoneal y están protegidos por una cápsula renal fibrosa.
                        </p>
                    </div>
                </div>

                <!-- Sección de Tarjetas de Características -->
                <div class="flex gap-6 mt-4 w-full">
                    <!-- Tarjeta 1: Morfología -->
                    <div class="bg-card w-1/3 p-6 rounded-xl flex flex-col items-center justify-center text-center border border-gray-800">
                        <div class="mb-4 text-4xl text-white">
                            <i class="fa-solid fa-seedling"></i>
                        </div>
                        <h3 class="text-white text-sm font-bold mb-1">Forma de</h3>
                        <h3 class="text-white text-sm font-bold">Frijol</h3>
                    </div>

                    <!-- Tarjeta 2: Dimensiones (Resaltada) -->
                    <div class="bg-highlight w-1/3 p-6 rounded-xl flex flex-col items-center justify-center text-center relative">
                        <div class="mb-4 text-4xl text-white relative z-10">
                            <i class="fa-solid fa-ruler-combined"></i>
                        </div>
                        <h3 class="text-white text-sm font-bold mb-1 relative z-10">10-12 cm</h3>
                        <h3 class="text-white text-sm font-bold relative z-10">150g Peso</h3>
                    </div>

                    <!-- Tarjeta 3: Ubicación y Protección -->
                    <div class="bg-card w-1/3 p-6 rounded-xl flex flex-col items-center justify-center text-center border border-gray-800 relative">
                        <!-- Botón para el enlace de NCBI -->
                        <div style="position: absolute; top: 5px; right: 5px;">
                            <button onclick="window.open(&#39;https://www.ncbi.nlm.nih.gov/books/NBK482385/&#39;, &#39;_blank&#39;)" class="button_tag">
                                <div class="clickable_source_tag"></div> 
                            </button>
                        </div>
                        <div class="mb-4 text-4xl text-white">
                            <i class="fa-solid fa-shield-virus"></i>
                        </div>
                        <h3 class="text-white text-sm font-bold mb-1">Cápsula</h3>
                        <h3 class="text-white text-sm font-bold">Fibrosa</h3>
                    </div>
                </div>
            </div>

            <!-- Columna Derecha: Visual (5 columnas) -->
            <div class="col-span-5 relative h-full overflow-hidden">
                <!-- Contenedor de Imagen -->
                <div class="absolute inset-0">
                    <img alt="Anatomía Renal" class="w-full h-full object-cover object-left-top" src="./presentacion5_files/6946579.jpg">
                    <!-- 400*228 -->
                </div>

                <!-- Elemento Decorativo -->
                <div class="absolute bottom-10 right-10 z-20 flex flex-col items-end gap-2">
                    <div class="px-4 py-2 bg-black rounded-md border border-gray-700">
                        <p class="text-brand text-xs font-mono font-bold tracking-widest">
                            <i class="fa-solid fa-microscope mr-2"></i>SISTEMA RENAL
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
