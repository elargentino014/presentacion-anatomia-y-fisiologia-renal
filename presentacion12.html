<body>
    <div id="page_container">
        <div class="grid grid-cols-12 h-full w-full">
            <!-- Columna Izquierda: Espacio para diseño o alineación -->
            <div class="col-span-6 flex flex-col justify-center pl-20">
                <div class="mb-12">
                    <div class="w-16 h-1 bg-accentCyan mb-6"></div>
                    <h2 class="text-textSecondary text-xl font-light tracking-widest mb-2 uppercase">Sistema Renal</h2>
                    <h1 class="text-textPrimary text-5xl font-bold leading-tight uppercase">
                        FILTRACIÓN <span class="text-accentCyan">GLOMERULAR</span>
                    </h1>
                    <p class="text-textSecondary text-lg mt-4 max-w-md font-light">
                        El proceso de ultrafiltración del plasma ocurre en los glomérulos, fundamental para la salud renal.
                    </p>
                </div>
            </div>

            <!-- Columna Derecha: Indicadores y Datos -->
            <div class="col-span-6 h-full flex flex-col justify-center pr-20 pl-4 relative z-30">
                <div class="space-y-6">
                    
                    <!-- Tarjeta 1: Volumen de filtración -->
                    <div class="bg-cardBg p-6 rounded-r-xl border-l-4 border-accentBlue flex items-center justify-between relative">
                        <div style="position: absolute; top: 0; right: 0;">
                            <button onclick="window.open(&#39;https://www.mayoclinic.org/es/diseases-conditions/chronic-kidney-disease/symptoms-causes/syc-20354521&#39;, &#39;_blank&#39;)" class="button_tag">
                                <div class="clickable_source_tag"></div> 
                            </button>
                        </div>
                        <div>
                            <h3 class="text-textSecondary text-xs uppercase font-bold mb-1">Volumen Diario</h3>
                            <div class="text-3xl font-bold text-textPrimary flex items-baseline">
                                180 <span class="text-accentCyan text-2xl ml-2">Litros / Día</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-droplet text-4xl text-accentBlue"></i>
                    </div>

                    <!-- Tarjeta 2: Tasa de Filtración -->
                    <div class="bg-cardBg p-6 rounded-r-xl border-l-4 border-accentCyan flex items-center justify-between relative">
                        <div style="position: absolute; top: 0; right: 0;">
                            <button onclick="window.open(&#39;https://www.kidney.org/es/kidney-topics/filtracion-glomerular-estimada-fge&#39;, &#39;_blank&#39;)" class="button_tag">
                                <div class="clickable_source_tag"></div> 
                            </button>
                        </div>
                        <div>
                            <h3 class="text-textSecondary text-xs uppercase font-bold mb-1">Salud Renal (TFG)</h3>
                            <div class="text-3xl font-bold text-textPrimary flex items-baseline">
                                Vital <span class="text-accentCyan text-2xl ml-2">Evaluación</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-Stethoscope text-4xl text-accentCyan"></i>
                    </div>

                    <!-- Tarjeta 3: Presiones -->
                    <div class="bg-cardBg p-6 rounded-r-xl border-l-4 border-accentBlue flex items-center justify-between">
                        <div>
                            <h3 class="text-textSecondary text-xs uppercase font-bold mb-1">Mecanismo de Presión</h3>
                            <div class="text-3xl font-bold text-textPrimary flex items-baseline">
                                Hidrostática <span class="text-accentCyan text-2xl ml-2">&amp; Oncótica</span>
                            </div>
                        </div>
                        <i class="fa-solid fa-gauge-high text-4xl text-accentBlue"></i>
                    </div>

                </div>
            </div>
        </div>
    </div>
