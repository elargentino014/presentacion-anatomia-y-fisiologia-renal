    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        .page_container {
            width: 1280px;
            min-height: 720px;
            background-color: #040710;
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .tech-line {
            position: absolute;
            background-color: #4FB0C0;
            opacity: 0.8;
        }
        
        .dot {
            position: absolute;
            width: 6px;
            height: 6px;
            background-color: #4FB0C0;
            border-radius: 50%;
        }

        .team-card {
            width: 260px;
            height: 400px;
            background-color: #1A1B1F;
            border-radius: 12px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .card-image-wrapper {
            width: 100%;
            height: 310px;
            overflow: hidden;
            background: #1A1B1F;
        }

        .card-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: left top;
        }

        .card-info {
            flex: 1;
            background-color: #2C6FCA;
            padding: 15px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .button_tag {
            background: none;
            border: none;
            outline: none;
            cursor: pointer;
        }

        .clickable_source_tag {
            width: 1rem;
            height: 1rem;
        }

        h1, h3 { font-weight: 700; color: #FFFFFF; }
        p { font-weight: 400; color: #FFFFFF; }
        .subtitle { color: #B0B3B8; font-weight: 300; }

        </div>

            </div>
            <div class="card-image-wrapper">

            </div>
            <div class="card-info">
                <h3 class="text-white text-lg font-bold">Corpúsculo Renal</h3>
                <p class="text-blue-100 text-xs opacity-80 mt-1 uppercase tracking-widest">Glomérulo y Bowman</p>
            </div>
        </div>

            <div class="card-image-wrapper">

        </div>
